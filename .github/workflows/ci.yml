# Hyperframes (npm) + stdlib Python tests — no API keys required.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  npm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: npm test
